<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PromptVault">
<meta name="theme-color" content="#0a0d17">
<meta name="description" content="프롬프트 저장소 관리 앱">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>⚡ Prompt Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0d17;--card:#111827;--card2:#0d1120;--bdr:#1e293b;--bdr2:#334155;
  --tx:#e2e8f0;--tx2:#94a3b8;--tx3:#4b5563;--tx4:#334155;
  --acc:#f59e0b;--acc2:#d97706;--grn:#059669;--red:#ef4444;
  --star:#facc15;--star2:#eab308;--stare:#1e293b;
  --c1:#f472b6;--c2:#a78bfa;--c3:#22d3ee;--c4:#34d399;--c5:#fb923c;--c6:#facc15;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;overflow-y:scroll}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100%;
  -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;padding-bottom:var(--safe-b)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#293548;border-radius:3px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit}
input:focus,textarea:focus{outline:none;border-color:var(--acc)!important}

.app{max-width:640px;margin:0 auto;padding:20px 16px 80px}

/* Header */
.hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:10px}
.logo{font-size:22px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(to right,#f1f5f9,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd-sub{display:flex;align-items:center;gap:8px;margin-top:3px}
.hd-r{display:flex;gap:6px;align-items:center;flex-shrink:0}

.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-ok{background:#22c55e}.dot-sync{background:var(--acc);animation:pulse 1s infinite}.dot-err{background:var(--red)}.dot-off{background:var(--tx3)}

/* Buttons */
.btn{display:flex;align-items:center;gap:5px;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;white-space:nowrap;transition:all .15s}
.btn:active{transform:scale(.93)}
.btn-p{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#0f172a}
.btn-s{background:var(--bdr);color:var(--tx2)}

/* Menu */
.mt{width:36px;height:36px;border-radius:8px;border:1px solid var(--bdr);background:var(--card);color:var(--tx2);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;position:relative;z-index:10;transition:.12s}
.md{position:absolute;top:42px;right:0;width:210px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:6px;z-index:20;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:menuIn .15s ease}
.mi{display:flex;align-items:center;gap:6px;width:100%;padding:8px 10px;border-radius:6px;color:#cbd5e1;font-size:12px;text-align:left;transition:.12s}
.mi:hover{background:rgba(255,255,255,.08)}.mi.dng{color:var(--red)}
.ms{height:1px;background:var(--bdr);margin:4px 0}
.mo{position:fixed;inset:0;z-index:9}

/* Form */
.fc{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:18px;margin-bottom:18px;display:flex;flex-direction:column;gap:14px}
.inp{width:100%;padding:10px 13px;border-radius:8px;border:1px solid var(--bdr);background:var(--bg);color:var(--tx);font-size:14px;outline:none}
.inp-m{font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;resize:vertical;min-height:120px}
.fl{font-size:12px;color:var(--tx2);font-weight:500;margin-bottom:8px}
.fa{display:flex;justify-content:flex-end;gap:8px}
.bc{padding:8px 18px;border-radius:8px;border:1px solid var(--bdr2);color:var(--tx2);font-size:13px;font-weight:500}
.bs{padding:8px 22px;border-radius:8px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#0f172a;font-size:13px;font-weight:600}

/* Tags */
.tp{display:flex;gap:6px;flex-wrap:wrap}
.tb{padding:5px 12px;border-radius:14px;font-size:12px;font-weight:500;transition:.12s}
.tb:active{transform:scale(.95)}

/* Toolbar */
.tbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.sb{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:10px;border:1px solid var(--bdr);background:var(--card);color:var(--tx3);flex:1;min-width:160px}
.si{flex:1;border:none;background:transparent;color:var(--tx);font-size:14px;outline:none}
.sg{display:flex;gap:4px}
.so{padding:7px 12px;border-radius:8px;border:1px solid var(--bdr);background:var(--card);color:var(--tx3);font-size:12px;font-weight:500;white-space:nowrap;transition:.12s}
.so:hover{background:rgba(255,255,255,.06)}.so.a{border-color:var(--bdr2);color:var(--tx);background:rgba(255,255,255,.06)}
.so.as{border-color:var(--star);color:var(--star);background:rgba(255,255,255,.06)}

/* Filters */
.fr{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fb{padding:4px 10px;border-radius:14px;border:1px solid var(--bdr);color:var(--tx3);font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px;transition:.12s}
.fb:active{transform:scale(.95)}.fb.a{background:rgba(255,255,255,.1);border-color:var(--bdr2);color:var(--tx)}
.fc2{font-size:10px;opacity:.6}
.frs{color:var(--tx3);font-size:11px;padding:2px 6px}

/* Cards */
.cl{display:flex;flex-direction:column;gap:6px}
.cd{background:var(--card);border:1px solid var(--bdr);border-radius:12px;border-left:3px solid var(--bdr2);overflow:hidden;transition:transform .15s}
.cd:active{transform:scale(.997)}
.cr{display:flex;align-items:stretch}
.fv{display:flex;align-items:center;justify-content:center;width:36px;flex-shrink:0;padding:0;color:var(--tx4);transition:.15s}
.fv:active{transform:scale(.85)}
.cb{flex:1;padding:12px 4px 12px 2px;cursor:pointer;min-width:0}
.ct{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.cn{font-size:14px;font-weight:600;color:#f1f5f9}
.badges{display:inline-flex;gap:3px;flex-wrap:wrap;margin-bottom:4px}
.badge{font-size:9px;font-weight:600;padding:0 5px;border-radius:10px;white-space:nowrap}
.cm{font-size:12px;color:#8b95a8;margin-bottom:2px;line-height:1.4}
.cmeta{font-size:11px;color:#3e4a5c;display:flex;align-items:center}
.cpb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;width:68px;min-height:72px;color:#0f172a;border-radius:0 9px 9px 0;flex-shrink:0;font-size:11px;font-weight:600;transition:.15s}
.cpb:active{transform:scale(.93)}.cpbg{background:linear-gradient(135deg,var(--acc),#e67e22)}.cpbd{background:var(--grn)}

/* Peek */
.pk{border-top:1px solid var(--bdr);padding:12px 14px;animation:peekIn .2s ease}
.pkpre{font-size:11px;color:#b0bac8;line-height:1.7;white-space:pre-wrap;word-break:break-all;font-family:'JetBrains Mono',monospace;background:#080b14;padding:14px;border-radius:8px;max-height:320px;overflow:auto;margin:0}
.pka{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
.smb{display:flex;align-items:center;gap:4px;padding:5px 12px;border-radius:6px;background:rgba(255,255,255,.04);color:var(--tx3);font-size:12px;transition:.12s}
.smb:hover{background:rgba(255,255,255,.07)}

/* Dividers */
.dv{display:flex;align-items:center;gap:8px;margin:6px 0 8px}.dv::after{content:'';flex:1;height:1px;background:var(--bdr)}
.dvl{font-size:11px;font-weight:600;white-space:nowrap}

/* Date filter */
.df-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.df-btn{padding:4px 10px;border-radius:14px;border:1px solid var(--bdr);color:var(--tx3);font-size:11px;font-weight:500;display:flex;align-items:center;gap:3px;transition:.12s;white-space:nowrap}
.df-btn:active{transform:scale(.95)}
.df-btn.a{background:rgba(99,102,241,.15);border-color:#6366f1;color:#818cf8}
.df-sel{padding:4px 8px;border-radius:14px;border:1px solid var(--bdr);background:var(--bg);color:var(--tx3);font-size:11px;font-weight:500;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer}
.df-sel:focus{border-color:#6366f1}

/* Date group */
.dg{display:flex;align-items:center;gap:8px;margin:10px 0 6px}.dg::after{content:'';flex:1;height:1px;background:var(--bdr)}
.dg-label{font-size:11px;font-weight:600;color:#6366f1;white-space:nowrap;display:flex;align-items:center;gap:4px}
.dg-cnt{font-size:10px;color:var(--tx3);font-weight:400}

/* Empty */
.emp{text-align:center;padding:50px 20px;background:var(--card);border-radius:14px;border:1px solid var(--bdr)}

/* Toast */
.toast{position:fixed;bottom:calc(24px + var(--safe-b));left:50%;transform:translateX(-50%);background:var(--grn);color:#fff;padding:9px 22px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 6px 24px rgba(0,0,0,.5);z-index:999;animation:tIn .25s ease;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}

/* Setup */
.sw{max-width:520px;margin:0 auto;padding-top:30px}
.stb{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;background:var(--bg);border-radius:10px;border:1px solid var(--bdr)}
.stn{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#0f172a;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.stt{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:2px}
.std{font-size:12px;color:#8b95a8;line-height:1.5}
.cbtn{width:100%;padding:12px;font-size:14px;border-radius:8px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#0f172a;font-weight:600;transition:.15s}
.cbtn:disabled{opacity:.5}.cbtn:active{transform:scale(.97)}
.skb{width:100%;padding:10px;font-size:13px;color:var(--tx3);border:1px solid var(--bdr);border-radius:8px;margin-top:8px}

/* Stars */
.stars{display:flex;gap:3px;align-items:center;cursor:pointer;padding:4px 0}
.stw{position:relative;cursor:pointer}
.stv{font-size:11px;color:var(--star);font-weight:600;margin-left:3px}

/* Install banner */
.ibanner{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.ibanner-t{flex:1;font-size:13px;color:var(--tx2);line-height:1.4}
.ibanner-b{padding:7px 14px;border-radius:8px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#0f172a;font-size:12px;font-weight:600;white-space:nowrap}
.ibanner-x{color:var(--tx3);font-size:16px;padding:4px;flex-shrink:0}

/* Anims */
@keyframes tIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes peekIn{from{opacity:0;max-height:0}to{opacity:1;max-height:600px}}
@keyframes menuIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:10px;color:var(--tx3)}
.spinner{width:28px;height:28px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div>Prompt Vault 로딩 중...</div></div>
<script>
// ================================================================
// ⚡ Prompt Vault — PWA  
// ================================================================
const LS_DATA='prompt-vault-data',LS_URL='prompt-vault-api-url',LS_HIDE='prompt-vault-hide-install';
const CATS=[{k:'여1',c:'#f472b6'},{k:'여2',c:'#a78bfa'},{k:'다수',c:'#22d3ee'},{k:'애니',c:'#34d399'},{k:'리얼',c:'#fb923c'},{k:'고퀄',c:'#facc15'}];
const CM=Object.fromEntries(CATS.map(c=>[c.k,c]));
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fd=ts=>new Date(ts).toLocaleDateString('ko-KR',{year:'numeric',month:'short',day:'numeric'});
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};

// Date helpers
function getDateGroup(ts){
  const now=new Date(),d=new Date(ts);
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const itemDay=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.floor((today-itemDay)/(1000*60*60*24));
  if(diff===0)return{key:'today',label:'오늘',order:0};
  if(diff===1)return{key:'yesterday',label:'어제',order:1};
  if(diff<=6)return{key:'week',label:'이번 주',order:2};
  if(diff<=29)return{key:'month',label:'이번 달',order:3};
  const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  const ml=d.toLocaleDateString('ko-KR',{year:'numeric',month:'long'});
  return{key:ym,label:ml,order:4+Math.floor(diff/30)};
}
function getYM(ts){const d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function getYMLabel(ym){const[y,m]=ym.split('-');return `${y}년 ${parseInt(m)}월`}
function matchDateFilter(ts,df){
  if(df==='all')return true;
  const now=new Date(),d=new Date(ts);
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const itemDay=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.floor((today-itemDay)/(1000*60*60*24));
  if(df==='today')return diff===0;
  if(df==='week')return diff<=6;
  if(df==='month')return diff<=29;
  return getYM(ts)===df;
}
function getAvailableMonths(ps){
  const months=new Map();
  ps.forEach(p=>{const ym=getYM(p.createdAt);if(!months.has(ym))months.set(ym,0);months.set(ym,months.get(ym)+1)});
  return[...months.entries()].sort((a,b)=>b[0].localeCompare(a[0]));
}

// SVG helpers
const ic=(d,sz=16,sw=2)=>`<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"><path d="${d}"/></svg>`;
const I={
  cp:'M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2 M9 2h6a1 1 0 011 1v2a1 1 0 01-1 1H9a1 1 0 01-1-1V3a1 1 0 011-1z',
  ck:'M20 6L9 17l-5-5',pl:'M12 5v14M5 12h14',x:'M18 6L6 18M6 6l12 12',
  tr:'M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2 M10 11v6M14 11v6',
  ed:'M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7 M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z',
  se:'M11 3a8 8 0 100 16 8 8 0 000-16zM21 21l-4.35-4.35',
  dn:'M6 9l6 6 6-6',up:'M18 15l-6-6-6 6',
  pin:'M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z',
};
const pinSvg=(f,s=18)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="${f?'#f59e0b':'none'}" stroke="${f?'#f59e0b':'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${I.pin}"/></svg>`;
const SP='M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z';
let _hcid=0;
const sSvg=(t,s=12)=>{
  if(t==='f')return`<svg width="${s}" height="${s}" viewBox="0 0 24 24"><path d="${SP}" fill="var(--star)" stroke="var(--star2)" stroke-width=".5"/></svg>`;
  if(t==='e')return`<svg width="${s}" height="${s}" viewBox="0 0 24 24"><path d="${SP}" fill="var(--stare)" stroke="var(--bdr2)" stroke-width="1"/></svg>`;
  const uid='hc'+(_hcid++);
  return`<svg width="${s}" height="${s}" viewBox="0 0 24 24"><path d="${SP}" fill="var(--stare)" stroke="var(--bdr2)" stroke-width="1"/><defs><clipPath id="${uid}"><rect x="0" y="0" width="12" height="24"/></clipPath></defs><path d="${SP}" fill="var(--star)" clip-path="url(#${uid})"/></svg>`;
};
const starsHtml=(v,s=11)=>{if(!v)return'';_hcid=Math.floor(Math.random()*10000);let h='';for(let i=0;i<5;i++){if(v>=i+1)h+=sSvg('f',s);else if(v>=i+.5)h+=sSvg('h',s);else h+=sSvg('e',s);}return`<span style="display:inline-flex;gap:1px;align-items:center">${h}</span>`;};

// DOM util
const $=s=>document.querySelector(s);

// Storage
const ldL=()=>{try{return JSON.parse(localStorage.getItem(LS_DATA))||[]}catch{return[]}};
const svL=d=>localStorage.setItem(LS_DATA,JSON.stringify(d));
const gUrl=()=>localStorage.getItem(LS_URL)||'';
const sUrl=u=>localStorage.setItem(LS_URL,u);
const cUrl=()=>localStorage.removeItem(LS_URL);

// Sheets API
async function shLoad(u){const r=await fetch(u);const j=await r.json();if(j.success)return j.data;throw new Error(j.error||'Fail')}
async function shPost(u,b){const r=await fetch(u,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(b)});const j=await r.json();if(!j.success)throw new Error(j.error);return j}

// State
let S={
  ps:[],url:'',conn:false,sync:'off',
  q:'',fc:[],sort:'date',df:'all', // df = date filter: 'all','today','week','month', or 'YYYY-MM'
  form:false,eid:null,peek:null,copied:null,
  f:{title:'',memo:'',content:'',categories:[],rating:0},
  menu:false,setup:false,toast:null,tt:null,
  installEvt:null,hideInstall:localStorage.getItem(LS_HIDE)==='1',
};

function flash(m){clearTimeout(S.tt);S.toast=m;S.tt=setTimeout(()=>{S.toast=null;R()},2200);R()}

// Data ops
async function svAll(d){S.ps=d;svL(d);R()}
async function addP(item){const d=[item,...S.ps];svL(d);S.ps=d;R();if(S.conn){try{await shPost(S.url,{action:'add',item});S.sync='ok'}catch{S.sync='error';flash('시트 동기화 실패 (로컬 저장됨)')}R()}}
async function updP(item){const d=S.ps.map(p=>p.id===item.id?item:p);svL(d);S.ps=d;R();if(S.conn){try{await shPost(S.url,{action:'update',item});S.sync='ok'}catch{S.sync='error'}R()}}
async function delP(id){const d=S.ps.filter(p=>p.id!==id);svL(d);S.ps=d;if(S.peek===id)S.peek=null;R();if(S.conn){try{await shPost(S.url,{action:'delete',id})}catch{S.sync='error';R()}}}
async function syncTo(){if(!S.conn)return;S.sync='syncing';R();try{await shPost(S.url,{action:'sync',items:S.ps});S.sync='ok';flash('시트 동기화 완료!')}catch{S.sync='error';flash('동기화 실패')}R()}
async function loadSh(){if(!S.conn)return;S.sync='syncing';R();try{const d=await shLoad(S.url);const m=d.map(p=>({...p,categories:p.categories||[],favorited:p.favorited||false}));S.ps=m;svL(m);S.sync='ok';flash('시트에서 불러오기 완료!')}catch(e){S.sync='error';flash('불러오기 실패')}R()}

async function cpTx(id,t){try{await navigator.clipboard.writeText(t)}catch{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a)}S.copied=id;flash('클립보드에 복사 완료!');R();setTimeout(()=>{S.copied=null;R()},1400)}

function resetF(){S.f={title:'',memo:'',content:'',categories:[],rating:0};S.eid=null;S.form=false;R()}

function handleSubmit(){
  if(!S.f.title.trim()||!S.f.content.trim()){flash('제목과 내용을 입력해주세요');return}
  if(S.eid){const ex=S.ps.find(p=>p.id===S.eid);updP({...ex,...S.f,updatedAt:Date.now()});flash('수정 완료! ✓')}

// Star rating — simple tap buttons, no full re-render
function mkStars(val,onChange,sz=24){
  const w=document.createElement('div');w.style.cssText='display:flex;align-items:center;gap:2px;padding:4px 0';
  let cur=val;
  function build(){
    w.innerHTML='';
    for(let i=0;i<5;i++){
      // Left half (0.5)
      const lBtn=document.createElement('button');
      lBtn.type='button';
      lBtn.style.cssText=`width:${sz/2}px;height:${sz+8}px;padding:0;margin:0;border:none;background:none;cursor:pointer;display:flex;align-items:center;overflow:hidden;-webkit-tap-highlight-color:transparent`;
      const lSvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      lSvg.setAttribute('width',sz);lSvg.setAttribute('height',sz);lSvg.setAttribute('viewBox','0 0 24 24');
      lSvg.style.cssText=`flex-shrink:0;pointer-events:none`;
      const filled=cur>=i+1,half=!filled&&cur>=i+0.5;
      if(filled||half){
        const p1=document.createElementNS('http://www.w3.org/2000/svg','path');
        p1.setAttribute('d',SP);p1.setAttribute('fill','#facc15');p1.setAttribute('stroke','#eab308');p1.setAttribute('stroke-width','0.5');
        lSvg.appendChild(p1);
      }
      if(!filled&&!half){
        const p2=document.createElementNS('http://www.w3.org/2000/svg','path');
        p2.setAttribute('d',SP);p2.setAttribute('fill','#1e293b');p2.setAttribute('stroke','#334155');p2.setAttribute('stroke-width','1');
        lSvg.appendChild(p2);
      }
      if(half){
        // Show full yellow star clipped to left half is already done above
        // But we need to show right half as empty - we'll handle in rBtn
      }
      lBtn.appendChild(lSvg);
      lBtn.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();const nv=i+0.5;cur=nv===cur?0:nv;onChange(cur);build()});
      w.appendChild(lBtn);

      // Right half (1.0)
      const rBtn=document.createElement('button');
      rBtn.type='button';
      rBtn.style.cssText=`width:${sz/2}px;height:${sz+8}px;padding:0;margin:0;border:none;background:none;cursor:pointer;display:flex;align-items:center;overflow:hidden;direction:rtl;-webkit-tap-highlight-color:transparent`;
      const rSvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      rSvg.setAttribute('width',sz);rSvg.setAttribute('height',sz);rSvg.setAttribute('viewBox','0 0 24 24');
      rSvg.style.cssText=`flex-shrink:0;pointer-events:none`;
      if(filled){
        const p3=document.createElementNS('http://www.w3.org/2000/svg','path');
        p3.setAttribute('d',SP);p3.setAttribute('fill','#facc15');p3.setAttribute('stroke','#eab308');p3.setAttribute('stroke-width','0.5');
        rSvg.appendChild(p3);
      } else {
        const p4=document.createElementNS('http://www.w3.org/2000/svg','path');
        p4.setAttribute('d',SP);p4.setAttribute('fill','#1e293b');p4.setAttribute('stroke','#334155');p4.setAttribute('stroke-width','1');
        rSvg.appendChild(p4);
      }
      rBtn.appendChild(rSvg);
      rBtn.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();const nv=i+1;cur=nv===cur?0:nv;onChange(cur);build()});
      w.appendChild(rBtn);
    }
    // Value display
    if(cur>0){
      const vSpan=document.createElement('span');
      vSpan.style.cssText='font-size:12px;color:#facc15;font-weight:600;margin-left:6px';
      vSpan.textContent=cur;
      w.appendChild(vSpan);
    }
  }
  build();
  return w;
}

   {n:3,t:'웹 앱으로 배포',d:'배포 → 새 배포 → 유형: <strong style="color:var(--acc)">웹 앱</strong><br>실행 주체: 나 / 액세스: <strong style="color:var(--acc)">모든 사용자</strong> → 배포'},
   {n:4,t:'URL 붙여넣기',d:'생성된 URL을 아래에 붙여넣으세요'}
  ].forEach(s=>{const b=document.createElement('div');b.className='stb';b.innerHTML=`<div class="stn">${s.n}</div><div><p class="stt">${s.t}</p><p class="std">${s.d}</p></div>`;fc.appendChild(b)});

  const ui=document.createElement('input');ui.className='inp';ui.placeholder='https://script.google.com/macros/s/...';ui.style.cssText="font-family:'JetBrains Mono',monospace;font-size:12px";fc.appendChild(ui);
  const ep=document.createElement('p');ep.style.cssText='color:var(--red);font-size:12px;line-height:1.5;display:none';fc.appendChild(ep);

  const cb=document.createElement('button');cb.className='cbtn';cb.textContent='연결하기';
  cb.onclick=async()=>{
    const url=ui.value.trim();
    if(!url.startsWith('https://script.google.com')){ep.textContent='올바른 URL이 아닙니다';ep.style.display='block';return}
    cb.textContent='연결 중...';cb.disabled=true;ep.style.display='none';
    try{
      const r=await fetch(url);const j=await r.json();
      if(j.success!==undefined){
        sUrl(url);S.url=url;S.conn=true;S.sync='ok';S.setup=false;
        if(j.data&&j.data.length>0){S.ps=j.data.map(p=>({...p,categories:p.categories||[],favorited:p.favorited||false}));svL(S.ps)}
        else if(S.ps.length>0)await shPost(url,{action:'sync',items:S.ps});
        flash('구글 시트 연결 완료! ✓');
      }else{ep.textContent='응답 형식 오류';ep.style.display='block'}
    }catch(e){ep.textContent='연결 실패: '+e.message;ep.style.display='block'}
    cb.textContent='연결하기';cb.disabled=false;
  };
  fc.appendChild(cb);

  const sk=document.createElement('button');sk.className='skb';sk.textContent='← 나중에 연결하기 (로컬만 사용)';sk.onclick=()=>{S.setup=false;R()};fc.appendChild(sk);
  inner.appendChild(fc);w.appendChild(inner);app.appendChild(w);
}

(function init(){
  S.ps=ldL();
  const url=gUrl();
  if(url){S.url=url;S.conn=true;S.sync='ok'}
  R();
  if(S.conn)loadSh().catch(()=>{});

  // PWA install
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();S.installEvt=e;R()});

  // Register SW
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
})();
</script>
